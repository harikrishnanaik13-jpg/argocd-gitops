apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-monitoring
  namespace: argocd
  annotations:
    # this app depends on prometheus-stack being up first
    # because ServiceMonitor CRD needs to exist
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/argocd-gitops
    targetRevision: HEAD
    path: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # retry because ServiceMonitor CRD might not exist yet
  # when prometheus is still coming up
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
