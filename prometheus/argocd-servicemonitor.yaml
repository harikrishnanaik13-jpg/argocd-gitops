---
# argocd exposes metrics on several components
# we need a ServiceMonitor for each one so prometheus knows to scrape them

# first we need argocd to expose metrics - it does by default but the services
# need to have the right labels for prometheus to find them

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-metrics
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - argocd
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-metrics
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

