apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      # we need to share a volume between the init container and main container
      # so helm binary can be placed where argocd looks for it
      volumes:
        - name: custom-tools
          emptyDir: {}

      initContainers:
        - name: download-helm
          image: alpine:3.18
          command:
            - sh
            - -c
            - |
              set -e
              # download helm 3.14.4 - using a newer version than what ships with argocd
              # argocd v2.12 ships with helm 3.13.x by default
              HELM_VERSION=v3.14.4
              wget -qO /tmp/helm.tar.gz \
                https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz
              tar -xzf /tmp/helm.tar.gz -C /tmp
              mv /tmp/linux-amd64/helm /custom-tools/helm
              chmod +x /custom-tools/helm
              echo "helm version installed:"
              /custom-tools/helm version
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools

      containers:
        - name: argocd-repo-server
          volumeMounts:
            - name: custom-tools
              mountPath: /usr/local/bin/helm
              subPath: helm
